name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install ".[viz]"
      - name: Run tests
        run: python -m unittest discover -s tests -v
